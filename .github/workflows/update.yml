name: 更新 RSS 聚合

on:
  schedule:
    # UTC 时间 0,4,8,12,16,20 点运行（即北京时间 8,12,16,20,0,4 点）
    - cron: '0 */4 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 设置 Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: 安装依赖
        run: npm install

      - name: 运行生成脚本
        run: npm run generate
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: 提交并推送更改
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add public/feed.xml public/feed.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "自动更新 RSS 源 [skip ci]" && git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main)
