<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI RSS 聚合器</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
        }
        h1 {
            color: #333;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }
        .rss-link {
            background: #f5f5f5;
            padding: 10px 15px;
            border-radius: 5px;
            margin: 20px 0;
            font-family: monospace;
        }
        .rss-link a {
            color: #0366d6;
            text-decoration: none;
        }
        .article {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }
        .article-title {
            font-size: 1.3em;
            margin-bottom: 5px;
        }
        .article-title a {
            color: #0366d6;
            text-decoration: none;
        }
        .article-title a:hover {
            text-decoration: underline;
        }
        .article-meta {
            color: #666;
            font-size: 0.85em;
            margin-bottom: 10px;
        }
        .article-summary {
            color: #444;
            background: #fafafa;
            padding: 10px;
            border-left: 3px solid #0366d6;
            margin: 10px 0;
        }
        .footer {
            margin-top: 40px;
            text-align: center;
            color: #666;
            font-size: 0.8em;
        }
        @media (prefers-color-scheme: dark) {
            body { background: #1e1e1e; color: #ddd; }
            h1 { color: #fff; border-bottom-color: #444; }
            .rss-link { background: #2d2d2d; }
            .article-title a { color: #58a6ff; }
            .article-meta { color: #8b949e; }
            .article-summary { background: #2d2d2d; border-left-color: #58a6ff; color: #ccc; }
            .footer { color: #8b949e; }
        }
    </style>
</head>
<body>
    <h1>🤖 AI RSS 聚合器</h1>
    <p>本站自动抓取多个科技源，并使用 AI 生成每篇文章的摘要，最后生成一个新的 RSS 源供您订阅。</p>

    <div class="rss-link">
        📡 订阅 RSS：<a href="feed.xml" target="_blank">feed.xml</a>
    </div>

    <div id="articles">
        <p>加载中...</p>
    </div>

    <div class="footer">
        <p>Powered by GitHub Actions & OpenAI | 更新于 <span id="update-time"></span></p>
    </div>

    <script>
        async function loadArticles() {
            try {
                const response = await fetch('feed.json');
                const data = await response.json();
                const container = document.getElementById('articles');
                if (!data.items || data.items.length === 0) {
                    container.innerHTML = '<p>暂无文章</p>';
                    return;
                }
                const html = data.items.map(item => `
                    <div class="article">
                        <div class="article-title">
                            <a href="${item.link}" target="_blank">${escapeHtml(item.title)}</a>
                        </div>
                        <div class="article-meta">
                            📅 ${new Date(item.pubDate).toLocaleString()} &nbsp;|&nbsp; 📰 ${escapeHtml(item.source)}
                        </div>
                        <div class="article-summary">
                            💡 ${escapeHtml(item.summary)}
                        </div>
                    </div>
                `).join('');
                container.innerHTML = html;
                document.getElementById('update-time').innerText = new Date(data.updated).toLocaleString();
            } catch (err) {
                document.getElementById('articles').innerHTML = '<p>加载失败，请刷新重试。</p>';
                console.error(err);
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            return text.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        loadArticles();
    </script>
</body>
</html>
